services:
  ${IMAGE_NAME}-${ENV_NAME}:
    image: ${IMAGE_NAME}:${BUILD_ID}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${IMAGE_NAME}-${ENV_NAME}.rule=Host(`${DEPLOY_HOST}`) && PathPrefix(`${DEPLOY_PATH}`)"
      - "traefik.http.services.${IMAGE_NAME}-${ENV_NAME}.loadbalancer.server.port=80"
    networks:
      - ${DEPLOY_NETWORK}

networks:
  ${DEPLOY_NETWORK}:
    external: true
