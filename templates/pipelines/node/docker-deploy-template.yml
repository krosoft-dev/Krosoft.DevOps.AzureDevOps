parameters:
  - name: pool
    type: object
  - name: sshEndpointPrefix
    type: string
  - name: envVariablesFilePrefix
    type: string
    default: null
  - name: environments
    type: object
  - name: targetFolder
    type: string
  - name: imageName
    type: string
  - name: nodeVersion
    type: string

stages:
  - ${{ each env in parameters.environments }}:
      - stage: Deploy_${{ replace(env,'-','_') }}_Stage
        displayName: Deploy '${{ replace(env,'-','_') }}'
        variables:
          - ${{ if ne(parameters.envVariablesFilePrefix, 'null') }}:
              - template: ${{ parameters.envVariablesFilePrefix }}-${{ lower(env) }}.yml@self
        jobs:
          - deployment: Build_${{ replace(env,'-','_') }}
            displayName: "Build"
            pool:
              name: ${{ parameters.pool }}
            workspace:
              clean: all
            environment: ${{ replace(env,'-','_') }}
            strategy:
              runOnce:
                deploy:
                  steps:
                    - checkout: templates
                      path: s/templates
                    - checkout: self
                    - template: ../../steps/resolve-basepath-template.yml
                    - template: ../../steps/node/build-template.yml
                      parameters:
                        nodeVersion: ${{ parameters.nodeVersion }}
                        workingDirectory: $(basePath)
                        buildMode: ${{ lower(env) }}

                    - script: ls -la $(Build.SourcesDirectory)
                      displayName: "Check sources directory"

                    - script: ls -la $(basePath)/dist
                      displayName: "Check working directory"

                    - script: |
                        mkdir -p /tmp/docker-build-context
                        cp -r $(basePath)/dist                                /tmp/docker-build-context/dist
                        cp $(templatesPath)/templates/docker/Dockerfile       /tmp/docker-build-context/Dockerfile
                        cp $(templatesPath)/templates/docker/nginx.conf       /tmp/docker-build-context/nginx.conf
                      displayName: "Assemble docker build context"

                    - script: |
                        set -e

                        # Chargement des variables depuis le .env du repo templates
                        set -a
                        source $(templatesPath)/templates/docker/.env
                        set +a

                        echo "→ NGINX_VERSION : $NGINX_VERSION"
                        echo "→ TZ          : $TZ"

                        docker build \
                          --build-arg NGINX_VERSION="$NGINX_VERSION" \
                          --build-arg TZ="$TZ" \
                          -t ${{ parameters.imageName }}:$(Build.BuildId) \
                          /tmp/docker-build-context

                        docker save ${{ parameters.imageName }}:$(Build.BuildId) \
                          | gzip > /tmp/${{ parameters.imageName }}.tar.gz
                      displayName: "Docker build & save"

                    - script: |
                        set -e
                        export IMAGE_NAME="${{ parameters.imageName }}"
                        export BUILD_ID="$(Build.BuildId)"
                        export ENV_NAME="${{ env }}"
                        export TRAEFIK_HOST="$(traefik_host)"
                        export TRAEFIK_PATH="$(traefik_path)"
                        export API_URL="$(api_url)"
                        export NODE_ENV="$(node_env)"
                        export NETWORK="$(network)"

                        envsubst < $(templatesPath)/templates/docker/docker-compose.template.yml \
                          > /tmp/docker-compose.${{ env }}.yml

                        echo "--- docker-compose.${{ env }}.yml ---"
                        cat /tmp/docker-compose.${{ env }}.yml
                      displayName: "Generate docker-compose.${{ env }}.yml"

                    - task: CopyFilesOverSSH@0
                      displayName: "Transfer files to server"
                      inputs:
                        sshEndpoint: ${{ parameters.sshEndpointPrefix }}-${{ lower(env) }}
                        sourceFolder: /tmp
                        contents: |
                          ${{ parameters.imageName }}.tar.gz
                          docker-compose.${{ env }}.yml
                        targetFolder: ${{ parameters.targetFolder }}
                        cleanTargetFolder: false

          - job: Deploy_${{ replace(env,'-','_') }}
            displayName: "Deploy"
            dependsOn: Build_${{ replace(env,'-','_') }}
            pool:
              name: ${{ parameters.pool }}
            steps:
              - checkout: none
              
              - task: SSH@0
                displayName: "Deploy ${{ env }} on server"
                inputs:
                  sshEndpoint: ${{ parameters.sshEndpointPrefix }}-${{ lower(env) }}
                  runOptions: inline
                  inline: |
                    set -e

                    TARGET_DIR="${{ parameters.targetFolder }}"

                    echo "→ Chargement image Docker..."
                    docker load < $TARGET_DIR/${{ parameters.imageName }}.tar.gz

                    echo "→ Nettoyage archive..."
                    rm -f $TARGET_DIR/${{ parameters.imageName }}.tar.gz

                    echo "→ docker compose up..."
                    docker compose -f $TARGET_DIR/docker-compose.${{ env }}.yml up -d --remove-orphans

                    echo "✓ ${{ env }} déployé"

                # - ${{ if ne(variables.currentCheckUrl, 'null') }}:
          #     - template: ../../steps/check-url-template.yml
          #       parameters:
          #         url: $(currentCheckUrl)
