parameters:
  - name: pool
    type: object
  - name: sshEndpointPrefix
    type: string
  - name: envVariablesFilePrefix
    type: string
    default: null
  - name: environments
    type: object
  - name: targetFolder
    type: string
  - name: imageName
    type: string
  - name: nodeVersion
    type: string




stages:
  - ${{ each env in parameters.environments }}:
      - stage: Deploy_${{ replace(env,'-','_') }}_Stage
        displayName: Deploy '${{ replace(env,'-','_') }}'

        variables:
          - ${{ if ne(parameters.envVariablesFilePrefix, 'null') }}:
              - template: ${{ parameters.envVariablesFilePrefix }}-${{ lower(env) }}.yml@self
              - name: currentTargetFolder
                value: $(targetFolder)
              - name: currentCheckUrl
                value: $(checkUrl)
        jobs:
          - deployment: Deploy_${{ replace(env,'-','_') }}
            pool:
              name: ${{ parameters.pool }}
            workspace:
              clean: all
            environment: ${{ replace(env,'-','_') }}
            strategy:
              runOnce:
                deploy:
                  steps:
                    - checkout: git://Krosoft.DevOps.AzureDevOps/Krosoft.DevOps.AzureDevOps
                    - checkout: self
                    - template: ../../steps/resolve-basepath-template.yml
                    - template: ../../steps/node/build-template.yml
                      parameters:
                        nodeVersion: ${{ parameters.nodeVersion }}
                        workingDirectory: $(basePath)
                        buildMode: ${{ lower(env) }}

                    # - template: ../../steps/ssh/deploy-dist-template.yml
                    #   parameters:
                    #     sshEndpoint: ${{ parameters.sshEndpointPrefix }}${{ lower(env) }}
                    #     targetFolder: $(currentTargetFolder)
                    #     sourceFolder: $(basePath)/dist

                    # - ${{ if ne(variables.currentCheckUrl, 'null') }}:
                    #     - template: ../../steps/check-url-template.yml
                    #       parameters:
                    #         url: $(currentCheckUrl)












